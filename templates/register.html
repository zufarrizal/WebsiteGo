<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
{{ if or .error .success }}
<div class="toast-stack" data-duration="3000">
    {{ if .error }}
    <div class="toast toast-error">{{ .error }}</div>
    {{ end }}
    {{ if .success }}
    <div class="toast toast-success">{{ .success }}</div>
    {{ end }}
</div>
{{ end }}
<main class="container">
    <section class="card">
        <h1>Register</h1>
        <form method="post" action="/register" class="form">
            <label>Nama</label>
            <input type="text" name="name" placeholder="Nama lengkap" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="name@example.com" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Min. 6 karakter" required>

            <button type="submit">Buat Akun</button>
        </form>
        <p class="hint">Sudah punya akun? <a href="/login">Login</a></p>
    </section>
</main>
<script>
(function () {
    var stack = document.querySelector(".toast-stack");
    if (!stack) {
        return;
    }
    var duration = parseInt(stack.getAttribute("data-duration"), 10);
    if (isNaN(duration) || duration < 0) {
        duration = 3000;
    }
    window.setTimeout(function () {
        stack.remove();
    }, duration);
})();
</script>
</body>
</html>
